description: >
  Homebase is an all-in-one workforce management platform for small businesses,
  offering employee scheduling, time tracking, payroll, team communication, and HR
  tools designed for hourly teams. Founded in 2014 and headquartered in San
  Francisco, California, Homebase serves over 100,000 small businesses across
  restaurants, retail, and service industries. The platform provides a REST API
  that enables third-party integrations and custom applications to access
  scheduling, time tracking, payroll sync, and team management data. Developers
  can authenticate via API key obtained through the Homebase account settings
  portal, with the base endpoint at app.joinhomebase.com/api/public. Homebase
  integrates natively with major point-of-sale systems, payroll providers, and
  HR platforms including Square, Toast, Clover, Gusto, ADP, and QuickBooks.
